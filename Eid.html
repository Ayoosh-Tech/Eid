<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eid Mubarak</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Scheherazade+New:wght@700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  height: 100vh;
  background: linear-gradient(180deg, #0b1d3a, #132c55);
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: 'Playfair Display', serif;
  color: #fff;
  overflow: hidden;
}

/* Floating stars */
body::before {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: url('https://www.transparenttextures.com/patterns/stardust.png');
  opacity: 0.3;
  animation: floatStars 20s linear infinite;
}

@keyframes floatStars {
  from { transform: translateY(0); }
  to { transform: translateY(-200px); }
}

.container {
  text-align: center;
  max-width: 350px;
  transform: translateY(-40px); /* moves everything up */
}
}

/* Arabic text */
.arabic {
  font-family: 'Scheherazade New', serif;
  font-size: 36px;
  color: #d4af37;
  margin-bottom: 20px;
}

/* Card */
.card {
  border: 1px solid rgba(212,175,55,0.4);
  padding: 25px;
  border-radius: 12px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(8px);
}

.card p {
  font-size: 14px;
  line-height: 1.7;
  color: #ddd;
}

/* Footer */
.footer {
  margin-top: 15px;
  color: #d4af37;
  font-size: 13px;
  font-style: italic;
}
  
  #playBtn {
  margin-top: 15px;
  background: rgba(212,175,55,0.9);
  color: #0b1d3a;
  border: none;
  padding: 10px 18px;
  border-radius: 25px;
  font-size: 13px;
  cursor: pointer;
  display: inline-block;
  transition: all 0.3s ease;
}

#playBtn:hover {
  box-shadow: 0 0 10px rgba(212,175,55,0.8),
              0 0 20px rgba(212,175,55,0.6),
              0 0 30px rgba(212,175,55,0.4);
  transform: scale(1.05);
}
</style>
</head>

<body>

<div class="container">

  <div class="arabic">عيد مبارك</div>

  <div class="card">
    <p>
      May this blessed occasion bring you joy, peace, and prosperity.
      May Allah accept your fasts, prayers, and good deeds.
      Wishing you and your family a celebration filled with love and togetherness.
    </p>

    <div class="footer">With love & prayers</div>
  </div>
  
<button onclick="playAudio()" id="playBtn">🔊 Tap for Sound</button>
</div>
<audio id="eidAudio" autoplay loop>
  <source src="eid.mp3" type="audio/mpeg">
</audio>

<script>
const audio = document.getElementById("eidAudio");
const btn = document.getElementById("playBtn");

let isPlaying = false;

function playAudio() {
  if (!isPlaying) {
    audio.play();
    audio.volume = 0.3;
    btn.innerText = "⏹️ Stop Sound";
    isPlaying = true;
  } else {
    audio.pause();
    audio.currentTime = 0; // resets sound (optional)
    btn.innerText = "▶️ Play Sound";
    isPlaying = false;
  }
}
</script>
</body>
</html>
